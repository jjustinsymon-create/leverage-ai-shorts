name: Daily Faceless Short

on:
  schedule:
    - cron: '0 13 * * *'   # 9:00 AM EST every day (13:00 UTC)
  workflow_dispatch:         # Also allows manual trigger from GitHub UI for testing

jobs:
  generate-and-upload:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies (FFmpeg + fonts)
        run: |
          sudo apt-get update -q
          sudo apt-get install -y ffmpeg fonts-dejavu-core fonts-liberation imagemagick

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Generate video and upload to YouTube
        env:
          GEMINI_API_KEY:  ${{ secrets.GEMINI_API_KEY }}
          PEXELS_API_KEY:  ${{ secrets.PEXELS_API_KEY }}
          YOUTUBE_TOKEN:   ${{ secrets.YOUTUBE_TOKEN }}
        run: python generate_short.py
